<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container d-flex justify-content-center align-items-center" style="height: 100vh;">
        <div class="card p-5 text-center shadow" style="border-radius: 20px; width: 400px;">
            
            {% for message in messages %}
                <div class="alert alert-info">{{ message }}</div>
            {% endfor %}

            <h3>📍 Mark Attendance</h3>
            <p>Button dabayein aur location verify karein.</p>
            
            <button class="btn btn-primary btn-lg w-100" onclick="getLocation()">
                Verify & Mark Attendance
            </button>
            
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary w-100 mt-2">Back to Dashboard</a>

            <form id="attendanceForm" method="POST" action="{% url 'submit_attendance' %}" hidden>
                {% csrf_token %}
                <input type="hidden" name="latitude" id="lat">
                <input type="hidden" name="longitude" id="lon">
            </form>
        </div>
    </div>

    <script>
    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lon').value = pos.coords.longitude;
                document.getElementById('attendanceForm').submit();
            }, () => { alert("Location access on karein!"); }, { enableHighAccuracy: true });
        }
    }
    </script>
</body>
</html>
