{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Show Attendance</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-image: url("{% static 'images/newdashboard.jpg' %}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: Arial, sans-serif;
        }

        .table-card{
            background: rgba(255,255,255,0.92);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        h2{
            color: #1a535c;
            font-weight: bold;
        }

        table{
            border-radius: 10px;
            overflow: hidden;
        }

        thead{
            background-color: #68a0a5;
            color: white;
        }

        tbody tr:hover{
            background-color: rgba(47,144,213,0.1);
            transition: 0.3s;
        }

        .status-present{
            color: green;
            font-weight: bold;
        }

        .status-absent{
            color: red;
            font-weight: bold;
        }

        .status-half{
            color: orange;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="table-card">

        <h2 class="text-center mb-4">
            Attendance Records
        </h2>

        <table class="table table-bordered table-hover text-center align-middle">

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Date</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                {% for i in attendance %}

                <tr>

                    <td>{{ i.employee.name }}</td>

                    <td>{{ i.date }}</td>

                    <td>

                        {% if i.status == "Present" %}
                            <span class="status-present">
                                {{ i.status }}
                            </span>

                        {% elif i.status == "Absent" %}
                            <span class="status-absent">
                                {{ i.status }}
                            </span>

                        {% else %}
                            <span class="status-half">
                                {{ i.status }}
                            </span>
                        {% endif %}

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
