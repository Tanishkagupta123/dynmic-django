{% extends 'base.html' %}
{% block contant %}
<div class="container mt-5">
    <div class="glass shadow-lg p-5 text-center" style="max-width: 450px; margin: auto; background: rgba(255,255,255,0.7); border-radius: 20px;">
        <h3 class="mb-3" style="color: #02225a;">📍 Check-In Office</h3>
        <p class="text-muted">Apni location verify karke attendance mark karein.</p>
        
        <button class="btn btn-primary btn-lg w-100 shadow-sm" onclick="getLocation()">
            Verify & Mark Attendance
        </button>
        
        <p id="loc-status" class="mt-3 text-primary fw-bold"></p>

        <form id="attendanceForm" method="POST" action="{% url 'mark_my_attendance' %}" hidden>
            {% csrf_token %}
            <input type="hidden" name="latitude" id="lat">
            <input type="hidden" name="longitude" id="lon">
        </form>
    </div>
</div>

<script>
function getLocation() {
    document.getElementById('loc-status').innerText = "Location verify ho rahi hai...";
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                document.getElementById('lat').value = pos.coords.latitude;
                document.getElementById('lon').value = pos.coords.longitude;
                document.getElementById('attendanceForm').submit();
            },
            () => { alert("Location access on karein!"); },
            { enableHighAccuracy: true }
        );
    }
}
</script>
{% endblock %}
