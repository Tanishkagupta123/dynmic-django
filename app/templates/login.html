{% load static %}

<style>
/* ===== Google Font ===== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

body {
    margin: 0;
    height: 100vh;
    font-family: 'Inter', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                url("{% static 'images/login-background-1920x1080-22718.jpg' %}") no-repeat center center fixed;
    background-size: cover;
}

/* ===== Login Card ===== */
.login-card {
    position: relative;
    width: 90%;
    max-width: 400px;
    padding: 40px 30px;
    border-radius: 25px;
    background: linear-gradient(145deg, rgba(255,255,255,0.85), rgba(255,255,255,0.95));
    box-shadow: 0 15px 40px rgba(0,0,0,0.3);
    backdrop-filter: blur(15px);
    transition: all 0.3s ease;
    animation: fadeIn 0.8s ease forwards;
}

/* Floating effect */
.login-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 50px rgba(0,0,0,0.35);
}

/* ===== Keyframes ===== */
@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px);}
    100% { opacity: 1; transform: translateY(0);}
}

/* ===== Error/message ===== */
.login-card h1 {
    text-align: center;
    color: #e74c3c;
    font-size: 1rem;
    margin-bottom: 15px;
}

/* ===== Card heading ===== */
.login-card h3 {
    text-align: center;
    font-weight: 700;
    font-size: 1.8rem;
    color: #222;
    margin-bottom: 30px;
}

/* ===== Form floating labels ===== */
.form-floating {
    position: relative;
    margin-bottom: 25px;
}

.form-floating input {
    width: 100%;
    padding: 14px 15px 14px 15px;
    border-radius: 12px;
    border: 1px solid #ccc;
    outline: none;
    transition: all 0.3s ease;
    background: rgba(255,255,255,0.9);
    font-size: 0.95rem;
}

.form-floating label {
    position: absolute;
    top: 50%;
    left: 15px;
    transform: translateY(-50%);
    background: transparent;
    padding: 0 5px;
    color: #777;
    pointer-events: none;
    transition: all 0.3s ease;
}

.form-floating input:focus + label,
.form-floating input:not(:placeholder-shown) + label {
    top: -10px;
    left: 12px;
    font-size: 0.75rem;
    color: #4e54c8;
    background: rgba(255,255,255,0.85);
}

/* ===== Checkbox ===== */
.login-card .form-check-label {
    font-size: 0.9rem;
    color: #555;
}

/* ===== Button ===== */
.login-card .btn-primary {
    width: 100%;
    padding: 12px;
    border-radius: 15px;
    font-weight: 600;
    font-size: 1rem;
    background: linear-gradient(90deg, #4e54c8, #8f94fb);
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
}

.login-card .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(78, 84, 200, 0.3);
    background: linear-gradient(90deg, #8f94fb, #4e54c8);
}

/* ===== Register Link ===== */
.login-card p {
    font-size: 0.9rem;
    color: #333;
    margin-top: 20px;
    text-align: center;
}

.login-card p a {
    color: #4e54c8;
    text-decoration: none;
    font-weight: 500;
    transition: color 0.3s ease;
}

.login-card p a:hover {
    color: #2c2f95;
}

/* ===== Responsive ===== */
@media (max-width: 768px) {
    .login-card {
        padding: 35px 20px;
    }
}

@media (max-width: 480px) {
    .login-card {
        padding: 25px 15px;
    }
    body {
        background-position: top;
    }
}
</style>

<div class="login-card shadow">
   {% if pqr %}
<div style="background-color:#f8d7da; color:#842029; padding:10px; border-radius:8px; text-align:center; margin-bottom:15px;">
    {{ pqr }}
</div>
{% endif %}
    <h3 class="text-center mb-4">Login</h3>

    <form method="post">
        {% csrf_token %}

        <div class="form-floating">
            <input type="email" class="form-control" name="email">
            <label>Email</label>
        </div>

        <div class="form-floating">
            <input type="password" class="form-control" name="password">
            <label>Password</label>
        </div>

        <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox">
            <label class="form-check-label">Remember me</label>
        </div>

        <div class="d-grid">
            <button type="submit" class="btn btn-primary">Login</button>
        </div>
    </form>

    <p class="text-center mt-3">
        Don't have an account? <a href="{% url 'registration' %}">Register</a>
    </p>
</div>
