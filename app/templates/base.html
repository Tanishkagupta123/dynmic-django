<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Employee Management System</title>

  <style>
    /* BODY */
    body {
      background: linear-gradient(135deg, #f0f4f8, #d9e2ec);
      min-height: 100vh;
      font-family: 'Segoe UI', 'Roboto', sans-serif;
      color: #1f2937;
      margin: 0;
    }

    /* NAVBAR */
    .navbar {
      background: rgba(255, 255, 255, 0.95) !important;
      backdrop-filter: blur(12px);
      padding: 15px 50px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      border-bottom-left-radius: 20px;
      border-bottom-right-radius: 20px;
    }

    .navbar-brand {
      font-size: 26px;
      font-weight: 800;
      color: #1d4ed8 !important;
      letter-spacing: 1px;
    }

    .nav-link {
      color: #334155 !important;
      margin-right: 25px;
      font-weight: 600;
      position: relative;
      transition: all 0.3s ease;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: -4px;
      left: 0;
      background: #3b82f6;
      transition: 0.3s;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .nav-link:hover {
      color: #1d4ed8 !important;
    }

    /* HERO SECTION - LIGHT BLUE */
    .hero-section {
      text-align: center;
      padding: 120px 20px;
      background: linear-gradient(90deg, #dbeafe, #bfdbfe); /* light gradient blue */
      color: #1e293b; /* dark text for contrast */
      border-radius: 20px;
      margin: 20px auto;
      width: 90%;
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
      animation: fadeIn 1s ease forwards;
    }

    .hero-section h1 {
      font-size: 52px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .hero-section p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    /* BUTTONS */
    .btn-custom {
      padding: 12px 28px;
      border-radius: 50px;
      font-weight: 700;
      margin: 8px;
      transition: all 0.3s ease;
      box-shadow: 0 6px 15px rgba(0,0,0,0.1);
    }

    .btn-register {
      background: #3b82f6;
      color: white;
      border: none;
    }

    .btn-register:hover {
      background: #60a5fa;
      color: #1e40af;
      transform: translateY(-3px);
    }

    .btn-login {
      border: 2px solid #1d4ed8;
      color: #1d4ed8;
      background: transparent;
    }

    .btn-login:hover {
      background: #1d4ed8;
      color: white;
      transform: translateY(-3px);
    }

    /* CONTENT BOX */
    .content-box {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(12px);
      border-radius: 25px;
      padding: 50px 40px;
      margin: 40px auto;
      width: 85%;
      box-shadow: 0 25px 50px rgba(0,0,0,0.15);
      color: #1e293b;
      animation: fadeUp 0.8s ease;
    }

    /* FORM ELEMENTS */
    input, select, textarea {
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 12px 15px;
      width: 100%;
      margin-bottom: 15px;
      transition: all 0.3s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 5px rgba(59,130,246,0.5);
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .navbar { padding: 15px 20px; }
      .hero-section h1 { font-size: 36px; }
      .hero-section p { font-size: 16px; }
      .content-box { padding: 30px 20px; width: 95%; }
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="{% url 'landing' %}">Employee Portal</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'landing' %}">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'registration' %}">Register User</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'login' %}">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'show_data' %}">All Users</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'show_query' %}">All Queries</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- LANDING PAGE HERO SECTION -->
{% if request.path == '/' %}
<div class="hero-section text-center py-5">
  <h1>Welcome to Employee Management System</h1>
  <p>Manage users, employee queries, and admin dashboard efficiently.</p>
  <a href="{% url 'registration' %}" class="btn btn-custom btn-register">Register User</a>
  <a href="{% url 'login' %}" class="btn btn-custom btn-login">Login</a>
</div>
{% endif %}

<!-- PAGE SPECIFIC CONTENT -->
{% block content %}
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
