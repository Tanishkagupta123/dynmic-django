<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <title>Student Management System</title>

  <style>
    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }

    .navbar {
      background: rgba(0, 0, 0, 0.75) !important;
      backdrop-filter: blur(10px);
      padding: 15px 40px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.4);
    }

    .navbar-brand {
      font-size: 24px;
      font-weight: 700;
      color: #00f5d4 !important;
    }

    .nav-link {
      color: white !important;
      margin-right: 20px;
      font-weight: 500;
      position: relative;
      transition: 0.3s;
    }

    .nav-link::after {
      content: "";
      position: absolute;
      width: 0%;
      height: 2px;
      bottom: 0;
      left: 0;
      background: #00f5d4;
      transition: 0.3s;
    }

    .nav-link:hover::after {
      width: 100%;
    }

    .nav-link:hover {
      color: #00f5d4 !important;
    }

    .hero-section {
      text-align: center;
      padding: 100px 20px;
    }

    .hero-section h1 {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .hero-section p {
      font-size: 18px;
      opacity: 0.9;
      margin-bottom: 40px;
    }

    .btn-custom {
      padding: 12px 30px;
      border-radius: 30px;
      font-weight: 600;
      margin: 10px;
      transition: 0.3s ease;
    }

    .btn-register {
      background: #00f5d4;
      color: black;
      border: none;
    }

    .btn-register:hover {
      background: white;
      transform: translateY(-3px);
    }

    .btn-login {
      border: 2px solid #00f5d4;
      color: #00f5d4;
      background: transparent;
    }

    .btn-login:hover {
      background: #00f5d4;
      color: black;
      transform: translateY(-3px);
    }

    .content-box {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 40px;
      margin: 40px auto;
      width: 85%;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      animation: fadeUp 0.8s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(25px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container-fluid">

    <!-- LOGO CLICK = LANDING PAGE -->
    <a class="navbar-brand" href="{% url 'landing' %}">Student Portal</a>

    <button class="navbar-toggler" type="button"
      data-bs-toggle="collapse"
      data-bs-target="#navbarSupportedContent">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent">

      <ul class="navbar-nav ms-auto">

        <li class="nav-item">
          <a class="nav-link" href="{% url 'landing' %}">Home</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'registration' %}">Registration</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'login' %}">Login</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'show_data' %}">Show Data</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="{% url 'show_query' %}">Show Query</a>
        </li>

      </ul>

    </div>
  </div>
</nav>

<!-- HERO SECTION ONLY FOR LANDING PAGE -->
{% if request.path == '/' %}
<div class="hero-section">
  <h1>Welcome to Student Management System</h1>
  <p>Manage student records, registration, and queries efficiently with a professional dashboard interface.</p>

  <a href="{% url 'registration' %}" class="btn btn-custom btn-register">Register Now</a>
  <a href="{% url 'login' %}" class="btn btn-custom btn-login">Login</a>
</div>
{% endif %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
